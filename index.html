<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8826 Palmetto Falls - Real Estate Portfolio</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1e293b;
            --text-light: #64748b;
            --accent: #0f766e;
            --border-light: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Cinematic Hero Section - Bright & Natural */
        .hero {
            position: relative;
            height: 75vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            background-color: #f8fafc;
        }

        .hero video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
            z-index: 0;
        }

        /* Sleek Title Block below the video */
        .title-block {
            text-align: center;
            padding: 4rem 2rem 2rem 2rem;
            background-color: var(--bg-color);
        }

        .title-block h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            color: #000;
        }

        .title-block p {
            font-size: 1rem;
            color: var(--text-light);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Filter Navigation */
        .filter-nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 0 2rem 3rem 2rem;
            background-color: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--border-light);
        }

        .filter-btn {
            background: none;
            border: none;
            padding: 0.5rem 1.5rem;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            color: var(--text-main);
            background-color: #f1f5f9;
        }

        .filter-btn.active {
            color: #fff;
            background-color: var(--text-main);
        }

        /* Masonry Grid */
        .gallery-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .masonry-grid {
            column-count: 3;
            column-gap: 1.5rem;
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            background: #f1f5f9;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .masonry-item.hidden {
            display: none;
        }

        .masonry-item img {
            width: 100%;
            display: block;
            transition: transform 0.6s ease;
        }

        .masonry-item:hover img {
            transform: scale(1.03);
        }

        /* Lightbox Overlay */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.98);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 85vh;
            object-fit: contain;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            user-select: none;
        }

        /* Lightbox Controls */
        .close-btn {
            position: absolute;
            top: 30px;
            right: 40px;
            color: white;
            font-size: 40px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
            z-index: 1001;
        }

        .close-btn:hover { color: var(--text-light); }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 40px;
            font-weight: 300;
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 20px;
            transition: transform 0.2s;
            z-index: 1001;
        }

        .nav-btn:hover { transform: translateY(-50%) scale(1.1); }
        .prev-btn { left: 30px; }
        .next-btn { right: 30px; }

        .lightbox-counter {
            position: absolute;
            bottom: 30px;
            color: #94a3b8;
            font-size: 0.875rem;
            letter-spacing: 2px;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .masonry-grid { column-count: 2; }
            .hero { height: 60vh; }
        }

        @media (max-width: 640px) {
            .masonry-grid { column-count: 1; }
            .title-block h1 { font-size: 1.75rem; }
            .filter-nav { padding: 0 1rem 2rem 1rem; }
            .filter-btn { padding: 0.5rem 1rem; font-size: 0.75rem; }
            .hero { height: 50vh; }
            .nav-btn { padding: 10px; font-size: 30px; }
            .close-btn { top: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <video autoplay loop muted playsinline>
            <source src="Video_Generation_Walking_Up_To_Door.mp4" type="video/mp4">
        </video>
    </header>

    <div class="title-block">
        <h1>8826 Palmetto Falls</h1>
        <p>San Antonio, TX</p>
    </div>

    <nav class="filter-nav" id="filterNav">
        <button class="filter-btn active" data-filter="all">All Photos</button>
        <button class="filter-btn" data-filter="exterior">Exterior</button>
        <button class="filter-btn" data-filter="living">Living & Dining</button>
        <button class="filter-btn" data-filter="kitchen">Kitchen</button>
        <button class="filter-btn" data-filter="beds-baths">Beds & Baths</button>
    </nav>

    <div class="gallery-container">
        <div class="masonry-grid" id="masonryGrid">
            
            <div class="masonry-item exterior"><img src="front-entry-1.jpg" alt="Front Entry"></div>
            <div class="masonry-item exterior"><img src="front-entry-2.jpg" alt="Front Entry"></div>
            <div class="masonry-item exterior"><img src="front-entry-3.jpg" alt="Front Entry"></div>
            <div class="masonry-item exterior"><img src="front-entry-4.jpg" alt="Front Entry"></div>
            <div class="masonry-item exterior"><img src="entry-1.jpg" alt="Entry"></div>
            <div class="masonry-item exterior"><img src="entry-2.jpg" alt="Entry"></div>
            <div class="masonry-item exterior"><img src="patio-1.jpg" alt="Patio"></div>
            <div class="masonry-item exterior"><img src="patio-2.jpg" alt="Patio"></div>
            <div class="masonry-item exterior"><img src="back-yard-1.jpg" alt="Backyard"></div>
            <div class="masonry-item exterior"><img src="back-yard-2.jpg" alt="Backyard"></div>
            <div class="masonry-item exterior"><img src="back-yard-3.jpg" alt="Backyard"></div>

            <div class="masonry-item living"><img src="living-room-1.jpg" alt="Living Room"></div>
            <div class="masonry-item living"><img src="living-room-2.jpg" alt="Living Room"></div>
            <div class="masonry-item living"><img src="living-room-3.jpg" alt="Living Room"></div>
            <div class="masonry-item living"><img src="living-room-4.jpg" alt="Living Room"></div>
            <div class="masonry-item living"><img src="living-room-5.jpg" alt="Living Room"></div>
            <div class="masonry-item living"><img src="dining-1.jpg" alt="Dining Room"></div>
            <div class="masonry-item living"><img src="dining-2.jpg" alt="Dining Room"></div>
            <div class="masonry-item living"><img src="playroom-1.jpg" alt="Playroom"></div>
            <div class="masonry-item living"><img src="playroom-2.jpg" alt="Playroom"></div>

            <div class="masonry-item kitchen"><img src="kitchen-1.jpg" alt="Kitchen"></div>
            <div class="masonry-item kitchen"><img src="Kitchen-2.jpg" alt="Kitchen"></div>
            <div class="masonry-item kitchen"><img src="kitchen-3.jpg" alt="Kitchen"></div>
            <div class="masonry-item kitchen"><img src="kitchen-4.jpg" alt="Kitchen"></div>

            <div class="masonry-item beds-baths"><img src="primary-1.jpg" alt="Primary Bedroom"></div>
            <div class="masonry-item beds-baths"><img src="primary-2.jpg" alt="Primary Bedroom"></div>
            <div class="masonry-item beds-baths"><img src="primary-3.jpg" alt="Primary Bedroom"></div>
            <div class="masonry-item beds-baths"><img src="primary-4.jpg" alt="Primary Bedroom"></div>
            <div class="masonry-item beds-baths"><img src="primary-bath-1.jpg" alt="Primary Bathroom"></div>
            <div class="masonry-item beds-baths"><img src="primary-bath-2.jpg" alt="Primary Bathroom"></div>
            <div class="masonry-item beds-baths"><img src="primary-closet.jpg" alt="Primary Closet"></div>
            <div class="masonry-item beds-baths"><img src="bed-2.jpg" alt="Bedroom"></div>
            <div class="masonry-item beds-baths"><img src="bed-3.jpg" alt="Bedroom"></div>
            <div class="masonry-item beds-baths"><img src="downstairs-bath.jpg" alt="Downstairs Bath"></div>
            <div class="masonry-item beds-baths"><img src="upstairs-bath.jpg" alt="Upstairs Bath"></div>
            <div class="masonry-item beds-baths"><img src="laundry.jpg" alt="Laundry Room"></div>
            
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <button class="nav-btn prev-btn" onclick="changeImage(-1)">&#10094;</button>
        <img id="lightbox-main-img" class="lightbox-img" src="" alt="Full Screen Image">
        <button class="nav-btn next-btn" onclick="changeImage(1)">&#10095;</button>
        <div id="lightbox-counter" class="lightbox-counter"></div>
    </div>

    <script>
        // --- Filtering Logic ---
        const filterBtns = document.querySelectorAll('.filter-btn');
        const masonryItems = document.querySelectorAll('.masonry-item');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active class from all buttons
                filterBtns.forEach(b => b.classList.remove('active'));
                // Add active class to clicked button
                btn.classList.add('active');

                const filterValue = btn.getAttribute('data-filter');

                masonryItems.forEach(item => {
                    if (filterValue === 'all') {
                        item.classList.remove('hidden');
                    } else {
                        if (item.classList.contains(filterValue)) {
                            item.classList.remove('hidden');
                        } else {
                            item.classList.add('hidden');
                        }
                    }
                });

                // Update lightbox images based on the active filter
                updateVisibleImagesForLightbox();
            });
        });

        // --- Lightbox Logic ---
        let visibleImages = [];
        let currentLightboxIndex = 0;

        function updateVisibleImagesForLightbox() {
            // Get only the images that are currently not hidden by the filter
            const activeElements = document.querySelectorAll('.masonry-item:not(.hidden) img');
            visibleImages = Array.from(activeElements).map(img => img.src);
            
            // Re-bind click events to the visible images
            activeElements.forEach((img, index) => {
                img.parentElement.onclick = () => openLightbox(index);
            });
        }

        function openLightbox(index) {
            currentLightboxIndex = index;
            renderLightboxContent();
            document.getElementById('lightbox').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Stop background scroll
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto'; // Restore scroll
        }

        function changeImage(direction) {
            currentLightboxIndex += direction;
            
            // Wrap around logic
            if (currentLightboxIndex >= visibleImages.length) {
                currentLightboxIndex = 0;
            } else if (currentLightboxIndex < 0) {
                currentLightboxIndex = visibleImages.length - 1;
            }
            
            renderLightboxContent();
        }

        function renderLightboxContent() {
            const lightboxImg = document.getElementById('lightbox-main-img');
            const counter = document.getElementById('lightbox-counter');
            
            lightboxImg.src = visibleImages[currentLightboxIndex];
            counter.innerText = `${currentLightboxIndex + 1} / ${visibleImages.length}`;
        }

        // --- Event Listeners ---
        // Initialize on load
        window.onload = updateVisibleImagesForLightbox;

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (lightbox.style.display === 'flex') {
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') changeImage(-1);
                if (e.key === 'ArrowRight') changeImage(1);
            }
        });

        // Close when clicking outside image
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
